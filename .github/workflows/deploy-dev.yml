# Dev deploy (TASK-024, ADR-009): every push to main ships to the
# jazz-master-web worker — that deployment IS the dev environment. The only
# deploy credential is the CLOUDFLARE_API_TOKEN repo secret; nothing on a
# development machine can deploy. Production is deliberately absent here
# (gated TASK-036: separate environment, manual UI trigger).
# workflow_dispatch exists so the owner can re-run after fixing secrets
# without needing a new commit.
name: deploy-dev

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # This job holds a real Cloudflare credential and runs dependency
    # lifecycle scripts, so: least-privilege GITHUB_TOKEN, SHA-pinned
    # third-party action, bounded runtime.
    permissions:
      contents: read
    timeout-minutes: 15
    defaults:
      run:
        working-directory: codebase
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # The same gate as local: typecheck + lint + test + build. CI is the
      # last automated check before code is publicly reachable on the dev URL.
      - run: bun run check
      - run: bun run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
